name: Tweet on merge to main

on:
  push:
    branches: [main]

jobs:
  tweet:
    runs-on: ubuntu-latest
    # Skip if commit message starts with "chore" or "ci" or is a merge commit with no meaningful changes
    if: |
      !startsWith(github.event.head_commit.message, 'chore') &&
      !startsWith(github.event.head_commit.message, 'ci:')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate tweet from commit
        id: generate
        run: |
          # Get commit message (first line only)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | cut -c1-120)
          
          # Get changed files summary
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -10)
          FILE_COUNT=$(echo "$CHANGED" | wc -l | tr -d ' ')
          
          # Detect change categories
          CATEGORIES=""
          echo "$CHANGED" | grep -q "frontend\|components\|pages\|src.*tsx\|src.*css" && CATEGORIES="${CATEGORIES}🎨 UI "
          echo "$CHANGED" | grep -q "backend\|api\|server\|gateway" && CATEGORIES="${CATEGORIES}⚙️ Backend "
          echo "$CHANGED" | grep -q "test\|spec\|\.test\." && CATEGORIES="${CATEGORIES}🧪 Tests "
          echo "$CHANGED" | grep -q "README\|docs\|\.md" && CATEGORIES="${CATEGORIES}📝 Docs "
          echo "$CHANGED" | grep -q "package\|lock\|config\|\.yml" && CATEGORIES="${CATEGORIES}🔧 Config "
          
          # Build tweet
          TWEET="🎴 meitra アップデート

          ${COMMIT_MSG}

          ${CATEGORIES}| ${FILE_COUNT} files changed

          https://meitra.kando1.com
          #buildinpublic #gamedev"
          
          # Clean up whitespace
          TWEET=$(echo "$TWEET" | sed 's/^          //g')
          
          # Escape for JSON
          TWEET_ESCAPED=$(echo "$TWEET" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")
          echo "tweet=$TWEET_ESCAPED" >> "$GITHUB_OUTPUT"

      - name: Post to X
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.MEITRA_X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.MEITRA_X_ACCESS_TOKEN_SECRET }}
        run: |
          TWEET=${{ steps.generate.outputs.tweet }}
          
          node -e "
          const crypto = require('crypto');
          const https = require('https');
          const CK = process.env.X_CONSUMER_KEY;
          const CS = process.env.X_CONSUMER_SECRET;
          const [at, ats] = [process.env.X_ACCESS_TOKEN, process.env.X_ACCESS_TOKEN_SECRET];
          
          function pe(s) { return encodeURIComponent(s).replace(/[!'()*]/g, c => '%' + c.charCodeAt(0).toString(16).toUpperCase()); }
          function oA(m, url) {
            const o = { oauth_consumer_key: CK, oauth_nonce: crypto.randomBytes(16).toString('hex'), oauth_signature_method: 'HMAC-SHA1', oauth_timestamp: Math.floor(Date.now()/1000).toString(), oauth_token: at, oauth_version: '1.0' };
            const ps = Object.keys(o).sort().map(k => pe(k)+'='+pe(o[k])).join('&');
            o.oauth_signature = crypto.createHmac('sha1', pe(CS)+'&'+pe(ats)).update(m+'&'+pe(url)+'&'+pe(ps)).digest('base64');
            return 'OAuth ' + Object.keys(o).sort().map(k => pe(k)+'=\"'+pe(o[k])+'\"').join(', ');
          }
          
          const text = JSON.parse(${TWEET});
          const body = JSON.stringify({ text });
          const url = 'https://api.x.com/2/tweets';
          const req = https.request(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': oA('POST', url) }
          }, res => {
            let d = '';
            res.on('data', c => d += c);
            res.on('end', () => {
              console.log('Status:', res.statusCode);
              console.log(d);
              if (res.statusCode !== 201) process.exit(1);
            });
          });
          req.write(body);
          req.end();
          "
